<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocID Tool - BISCUIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://unpkg.com/tabulator-tables@6.2.1/dist/css/tabulator_semanticui.min.css" rel="stylesheet">
    
    <style>
        .tabulator { border-radius: 0.5rem; border: 1px solid #e5e7eb; background-color: white; font-size: 0.875rem; }
        .tabulator-col-title { font-weight: 700 !important; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; }
        .tabulator-row { border-bottom: 1px solid #f3f4f6 !important; }
        .tabulator-row:nth-child(even) { background-color: #f9fafb !important; }
        .tabulator-row:hover { background-color: #eff6ff !important; }
        
        .filter-select { 
            border-radius: 0.5rem; 
            border: 1px solid #d1d5db; 
            padding: 0.5rem; 
            font-size: 0.875rem; 
            background-color: white;
            min-width: 150px;
        }
        #searchInput { width: 300px; border-radius: 0.5rem; border: 1px solid #d1d5db; padding: 0.5rem 1rem; }
        #searchInput:focus, .filter-select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="bg-gray-100 p-6 font-sans">
    <div class="max-w-6xl mx-auto">
        <button onclick="window.location.href = window.location.protocol + '//' + window.location.hostname;" class="text-blue-600 hover:underline mb-4 inline-block font-semibold bg-transparent border-0 cursor-pointer">
            ← Back to Homepage
        </button>
        
        <div class="bg-white rounded-lg shadow-lg p-8">
            <div class="border-b pb-4 mb-6">
                <div class="flex justify-between items-end">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-800">DocID Tool</h1>
                        <p class="text-gray-500 text-sm mt-1">Reference table for Shows, Theatres, and Document IDs.</p>
                    </div>
                    
                    <button onclick="forceRefresh()" id="refreshBtn" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2 px-4 rounded-lg transition-colors flex items-center text-sm border border-gray-300 shadow-sm whitespace-nowrap">
                        <span id="refreshIcon" class="mr-2">🔄</span> Resync
                    </button>
                </div>

                <!-- Filter Row -->
                <div class="flex flex-wrap items-center gap-4 mt-6">
                    <input type="text" id="searchInput" placeholder="🔍 Search (e.g. Show, Theatre)...">
                    
                    <select id="showFilter" class="filter-select">
                        <option value="">All Shows</option>
                    </select>

                    <select id="theatreFilter" class="filter-select">
                        <option value="">All Theatres</option>
                    </select>

                    <select id="docTypeFilter" class="filter-select">
                        <option value="">All Doc Types</option>
                    </select>
                </div>
            </div>

            <div id="docid-table" class="w-full"></div>
        </div>
    </div>

    <script src="https://unpkg.com/tabulator-tables@6.2.1/dist/js/tabulator.min.js"></script>
    <script>
        let table;

        document.addEventListener("DOMContentLoaded", function() {
            table = new Tabulator("#docid-table", {
                ajaxURL: "/api/docids",
                height: "550px",
                layout: "fitColumns",
                pagination: "local",
                paginationSize: 50,
                
                ajaxResponse: function(url, params, response){
                    // Map the response and populate dropdowns while we're at it
                    const mappedData = response.map(row => ({
                        showName: row[0] || "N/A",
                        theatreName: row[1] || "N/A",
                        docName: row[2] || "N/A",
                        showId: row[3],
                        theatreId: row[4],
                        docId: row[5]
                    }));
                    
                    populateDropdowns(mappedData);
                    return mappedData;
                },
                
                columns: [
                    { title: "Show Name", field: "showName", widthGrow: 2 },
                    { title: "Theatre Name", field: "theatreName", widthGrow: 2 },
                    { title: "Document Name", field: "docName", widthGrow: 2 },
                    { title: "Show ID", field: "showId", hozAlign: "right", cssClass: "font-mono font-bold" },
                    { title: "Theatre ID", field: "theatreId", hozAlign: "right", cssClass: "font-mono font-bold" },
                    { title: "DocType ID", field: "docId", hozAlign: "right", cssClass: "font-mono font-bold" }
                ]
            });

            // Master Filter Logic
            function updateFilters() {
                const searchValue = document.getElementById("searchInput").value.toLowerCase();
                const showValue = document.getElementById("showFilter").value;
                const theatreValue = document.getElementById("theatreFilter").value;
                const docValue = document.getElementById("docTypeFilter").value;

                // Split keywords by comma
                const keywords = searchValue.split(',').map(k => k.trim()).filter(k => k !== "");

                table.setFilter(function(data) {
                    // 1. Dropdown Matches
                    const matchShow = !showValue || data.showName === showValue;
                    const matchTheatre = !theatreValue || data.theatreName === theatreValue;
                    const matchDoc = !docValue || data.docName === docValue;

                    // 2. Multi-Keyword Search Match
                    const rowContent = `${data.showName} ${data.theatreName} ${data.docName} ${data.showId} ${data.theatreId} ${data.docId}`.toLowerCase();
                    const matchKeywords = keywords.every(kw => rowContent.includes(kw));

                    return matchShow && matchTheatre && matchDoc && matchKeywords;
                });
            }

            // Event Listeners
            let searchTimeout;
            document.getElementById("searchInput").addEventListener("input", function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(updateFilters, 300);
            });

            document.getElementById("showFilter").addEventListener("change", updateFilters);
            document.getElementById("theatreFilter").addEventListener("change", updateFilters);
            document.getElementById("docTypeFilter").addEventListener("change", updateFilters);
        });

        function populateDropdowns(data) {
            const getUnique = (field) => [...new Set(data.map(item => item[field]))].sort();
            
            fillSelect("showFilter", getUnique("showName"));
            fillSelect("theatreFilter", getUnique("theatreName"));
            fillSelect("docTypeFilter", getUnique("docName"));
        }

        function fillSelect(id, values) {
            const select = document.getElementById(id);
            // Clear existing except "All"
            select.innerHTML = `<option value="">All ${id.replace('Filter', 's')}</option>`;
            values.forEach(val => {
                if(val && val !== "N/A") {
                    const opt = document.createElement("option");
                    opt.value = val;
                    opt.textContent = val;
                    select.appendChild(opt);
                }
            });
        }

        async function forceRefresh() {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            
            btn.disabled = true;
            btn.classList.add('opacity-50');
            icon.classList.add('animate-spin');

            try {
                const response = await fetch('/api/docids/refresh', { method: 'POST' });
                if (response.ok) {
                    // Reset all filters and reload
                    document.getElementById('searchInput').value = "";
                    document.getElementById('showFilter').value = "";
                    document.getElementById('theatreFilter').value = "";
                    document.getElementById('docTypeFilter').value = "";
                    table.clearFilter();
                    table.setData();
                } else {
                    alert("Failed to refresh database.");
                }
            } catch (err) {
                alert("Network error occurred.");
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                icon.classList.remove('animate-spin');
            }
        }
    </script>
</body>
</html>
