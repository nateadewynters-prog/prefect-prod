<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power BI Report Dispatcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap');
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .log-entry { border-left: 2px solid #3b82f6; padding-left: 10px; margin-bottom: 4px; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="bg-gray-100 p-6 font-sans">
    <div class="max-w-4xl mx-auto">
        <button onclick="window.location.href = window.location.protocol + '//' + window.location.hostname;" class="text-blue-600 hover:underline mb-4 inline-block font-semibold bg-transparent border-0 cursor-pointer">
            ← Back to Homepage
        </button>
        
        <div class="bg-white rounded-lg shadow p-8 mb-6">
            <div class="flex justify-between items-center border-b pb-4 mb-6">
                <h1 class="text-3xl font-bold text-gray-800">Power BI Report Dispatcher</h1>
                <div id="status-indicator" class="hidden flex items-center text-blue-600 font-bold px-4 py-2 bg-blue-50 rounded-lg">
                    <span class="animate-ping mr-3 inline-flex h-3 w-3 rounded-full bg-blue-500 opacity-75"></span> 
                    SYSTEM BUSY: DISPATCHING
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                {% for show in shows %}
                <div class="border border-gray-200 rounded-xl p-5 flex flex-col justify-between bg-gray-50 hover:bg-white transition-all shadow-sm">
                    <div>
                        <h2 class="text-xl font-bold text-gray-800">{{ show.show_name }}</h2>
                        <p class="text-xs text-gray-500 font-mono mt-1 mb-4">
                            Show ID: <span class="font-bold">{{ show.show_id }}</span> | 
                            Database: <span class="font-bold">{{ show.db_type }}</span>
                        </p>
                    </div>
                    
                    <div class="flex flex-col gap-2 mt-4">
                        <a href="{{ show.dashboard_url }}" target="_blank" class="dashboard-link w-full bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold py-2.5 px-4 rounded-lg text-center transition-all">
                            📊 View Dashboard
                        </a>

                        <button onclick="openQueryModal('{{ show.id }}')" class="secondary-btn w-full bg-green-100 hover:bg-green-200 text-green-700 font-bold py-2.5 px-4 rounded-lg text-center transition-all">
                            🔍 Query Database
                        </button>
                        
                        <button onclick="previewEmail('{{ show.id }}')" class="secondary-btn w-full bg-purple-100 hover:bg-purple-200 text-purple-700 font-bold py-2.5 px-4 rounded-lg text-center transition-all">
                            📧 View Email Body
                        </button>

                        <button onclick="runReport('{{ show.id }}')" id="btn-{{ show.id }}" class="tool-btn bg-gray-800 hover:bg-black text-white font-bold py-2.5 px-4 rounded-lg transition-all w-full disabled:opacity-50">
                            Dispatch Report
                        </button>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <div id="status-box" class="hidden bg-gray-900 rounded-lg shadow-2xl p-6 border-t-4 border-blue-500">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-blue-400 font-mono font-bold uppercase tracking-widest text-sm">System Terminal</h3>
                <button onclick="clearLogs()" class="text-gray-500 text-xs hover:text-white font-mono">CLEAR_CONSOLE</button>
            </div>
            <div id="log-list" class="space-y-1 font-mono text-xs md:text-sm text-gray-300 h-64 overflow-y-auto bg-black p-4 rounded-md border border-gray-800"></div>
        </div>
    </div>

    <div id="queryModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-2xl max-w-md w-full overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 id="modalTitle" class="text-xl font-bold text-gray-800">SQL Raw Data</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <div class="p-6 max-h-[450px] overflow-y-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b text-gray-500 text-xs uppercase tracking-wider">
                            <th class="py-2">Metric</th>
                            <th class="py-2">Value</th>
                        </tr>
                    </thead>
                    <tbody id="modalBody" class="font-mono text-sm text-gray-700">
                        </tbody>
                </table>
            </div>
            <div class="p-4 bg-gray-50 text-right">
                <button onclick="closeModal()" class="bg-gray-800 hover:bg-black text-white px-6 py-2 rounded-lg font-bold transition-colors">Close</button>
            </div>
        </div>
    </div>

    <script>
        let lastLogCount = 0;

        function clearLogs() { 
            document.getElementById('log-list').innerHTML = '<div class="text-gray-500">Console cleared locally. Real-time events will appear here...</div>';
            lastLogCount = -1; 
        }

        function previewEmail(id) {
            const width = 900, height = 700;
            const left = (window.innerWidth / 2) - (width / 2);
            const top = (window.innerHeight / 2) - (height / 2);
            window.open(`/preview/${id}`, 'EmailPreview', `width=${width},height=${height},top=${top},left=${left},scrollbars=yes`);
        }

        function openQueryModal(id) {
            const body = document.getElementById('modalBody');
            const title = document.getElementById('modalTitle');
            document.getElementById('queryModal').classList.remove('hidden');
            body.innerHTML = '<tr><td colspan="2" class="py-8 text-center animate-pulse text-blue-500 font-bold">Querying TicketingDS...</td></tr>';
            
            fetch(`/query/${id}`)
                .then(r => r.json())
                .then(res => {
                    if (res.error) throw new Error(res.error);
                    title.innerText = `${res.show} - Raw SQL Output`;
                    body.innerHTML = res.data.map(r => `
                        <tr class="border-b hover:bg-gray-50 transition-colors">
                            <td class="py-3 text-gray-500 font-semibold">${r.Metric}</td>
                            <td class="py-3 font-bold ${r.Value.includes('None') ? 'text-red-500':'text-blue-600'}">${r.Value}</td>
                        </tr>
                    `).join('');
                })
                .catch(err => {
                    body.innerHTML = `<tr><td colspan="2" class="py-8 text-center text-red-500 font-bold font-mono">ERROR: ${err.message}</td></tr>`;
                });
        }

        function closeModal() { document.getElementById('queryModal').classList.add('hidden'); }

        function pollSharedState() {
            fetch('/api/state')
                .then(r => r.json())
                .then(data => {
                    const isSystemBusy = data.locks.length > 0;

                    // 1. Lock/Unlock Dispatch Buttons
                    document.querySelectorAll('.tool-btn').forEach(btn => {
                        const id = btn.id.replace('btn-', '');
                        if (isSystemBusy) {
                            btn.disabled = true;
                            if (data.locks.includes(id)) {
                                btn.innerText = "⏳ DISPATCHING...";
                                btn.classList.add('animate-pulse', 'bg-yellow-600', 'hover:bg-yellow-600');
                                btn.classList.remove('bg-gray-800', 'hover:bg-black', 'opacity-50');
                            } else {
                                btn.innerText = "Waiting...";
                                btn.classList.add('opacity-50', 'bg-gray-800', 'cursor-not-allowed');
                                btn.classList.remove('animate-pulse', 'bg-yellow-600', 'hover:bg-yellow-600');
                            }
                        } else {
                            btn.disabled = false;
                            btn.innerText = "Dispatch Report";
                            btn.classList.remove('animate-pulse', 'bg-yellow-600', 'hover:bg-yellow-600', 'opacity-50', 'cursor-not-allowed');
                            btn.classList.add('bg-gray-800', 'hover:bg-black');
                        }
                    });

                    // 2. Lock/Unlock Secondary Buttons (Query & Email Preview)
                    document.querySelectorAll('.secondary-btn').forEach(btn => {
                        if (isSystemBusy) {
                            btn.disabled = true;
                            btn.classList.add('opacity-50', 'cursor-not-allowed');
                        } else {
                            btn.disabled = false;
                            btn.classList.remove('opacity-50', 'cursor-not-allowed');
                        }
                    });

                    // 3. Lock/Unlock Dashboard Links
                    document.querySelectorAll('.dashboard-link').forEach(link => {
                        if (isSystemBusy) {
                            link.classList.add('opacity-50', 'pointer-events-none');
                        } else {
                            link.classList.remove('opacity-50', 'pointer-events-none');
                        }
                    });

                    // Manage visibility of the status elements
                    if (isSystemBusy || data.logs.length > 0) {
                        document.getElementById('status-box').classList.remove('hidden');
                        if (isSystemBusy) {
                            document.getElementById('status-indicator').classList.remove('hidden');
                        } else {
                            document.getElementById('status-indicator').classList.add('hidden');
                        }
                    }

                    // Update the terminal output
                    if (data.logs.length !== lastLogCount && lastLogCount !== -1) {
                        const logList = document.getElementById('log-list');
                        logList.innerHTML = data.logs.map(l => {
                            let colorClass = 'text-gray-300';
                            if (l.type === 'success') colorClass = 'text-green-400 border-green-500';
                            if (l.type === 'error') colorClass = 'text-red-400 border-red-500 font-bold';
                            if (l.type === 'separator') colorClass = 'text-blue-400 border-blue-500 font-bold mt-4 mb-2'; 
                            
                            const timeStr = l.timestamp.split(' ')[1]; 
                            return `<div class="log-entry ${colorClass}"><span class="text-gray-600">[${timeStr}]</span> ${l.msg}</div>`;
                        }).join('');
                        
                        logList.scrollTop = logList.scrollHeight; 
                        lastLogCount = data.logs.length;
                    } else if (lastLogCount === -1) {
                        lastLogCount = data.logs.length; 
                    }
                })
                .catch(err => console.error("Polling error:", err));
        }

        pollSharedState();
        setInterval(pollSharedState, 2000);

        function runReport(id) {
            const eventSource = new EventSource(`/stream/${id}`);
            eventSource.onmessage = function(event) {
                if (event.data === "[DONE]") {
                    eventSource.close();
                }
            };
            eventSource.onerror = function() {
                eventSource.close();
            };
            // Force an immediate UI update so the button locks instantly
            setTimeout(pollSharedState, 300);
        }
    </script>
</body>
</html>
