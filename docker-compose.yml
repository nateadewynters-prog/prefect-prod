services:
  # --- 1. THE ORCHESTRATION BRAIN ---
  prefect-server:
    image: prefecthq/prefect:3-python3.13
    container_name: prefect-server
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      - PREFECT_API_URL=http://10.1.50.127:4200/api
      - PREFECT_UI_API_URL=http://10.1.50.127:4200/api
    volumes:
      - /opt/prefect/prod/prefect_db_data:/root/.prefect
    command: prefect server start --host 0.0.0.0
    # Added Log Rotation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# --- 2. SALES REPORT EXTRACTION WORKER ---
  sales-report-extraction:
    build:
      context: ./sales_report_extraction  # <-- 1. Context updated to new folder name
      dockerfile: Dockerfile.sales        # <-- Matches the renamed Dockerfile
    container_name: prefect-sales-extraction
    restart: unless-stopped
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - PYTHONPATH=/opt/prefect/prod/code/sales_report_extraction  # <-- Pointing to the new root so 'from src.x' works
    volumes:
      - /opt/prefect/prod/.env:/opt/prefect/prod/.env:ro
      # 2. Updated volume mount for the new config location
      - ./sales_report_extraction/config:/opt/prefect/prod/code/sales_report_extraction/config
      # 3. Updated volume mount for Medallion data
      - /opt/data/outlook_automation/data:/opt/prefect/prod/code/sales_report_extraction/data 
    depends_on:
      - prefect-server
    # 4. The new, much cleaner startup command!
    command: python main.py
    # Added Log Rotation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# --- 3. BRANDWATCH EXTRACTION SERVICE ---
  brandwatch-extraction:
    build:
      context: ./brandwatch_extraction
      dockerfile: Dockerfile.brandwatch
    container_name: prefect-brandwatch-extraction
    restart: unless-stopped
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - PYTHONPATH=/opt/prefect/prod/code/brandwatch_extraction
    volumes:
      # 🚀 THE FIX: Removed /config and /data volumes. This is a purely stateless API-to-DB container!
      - /opt/prefect/prod/.env:/opt/prefect/prod/.env:ro
    depends_on:
      - prefect-server
    command: python main.py # 🚀 THE FIX: Tell it to run the script!
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# --- 4. POWER BI REFRESH TOOL (STREAMLIT) ---
  pbi-refresh-tool:
    build:
      context: ./pbi_refresh_tool
      dockerfile: Dockerfile
    container_name: streamlit-pbi-tool
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    volumes:
      - /opt/prefect/prod/.env:/app/.env:ro
      - ./pbi_refresh_tool/data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"