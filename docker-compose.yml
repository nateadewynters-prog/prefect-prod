services:
  # --- 1. THE ORCHESTRATION BRAIN ---
  prefect-server:
    image: prefecthq/prefect:3-python3.13
    container_name: prefect-server
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      - PREFECT_API_URL=http://10.1.50.127:4200/api
      - PREFECT_UI_API_URL=http://10.1.50.127:4200/api
      - PREFECT_SERVER_API_HOST=0.0.0.0
    volumes:
      - /opt/prefect/prod/prefect_db_data:/root/.prefect
    command: prefect server start
    healthcheck:
      # Native Python check (no curl/wget needed)
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:4200/api/health\").read()' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s # Docker ignores failures for the first 40 seconds
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # --- 2. SALES REPORT EXTRACTION ---
  sales-report-extraction:
    build:
      context: ./sales_report_extraction
      dockerfile: Dockerfile.sales
    container_name: prefect-sales-extraction
    restart: unless-stopped
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - PYTHONPATH=/opt/prefect/prod/code/sales_report_extraction
    volumes:
      - /opt/prefect/prod/.env:/opt/prefect/prod/.env:ro
      - ./sales_report_extraction/config:/opt/prefect/prod/code/sales_report_extraction/config
      - /opt/data/outlook_automation/data:/opt/prefect/prod/code/sales_report_extraction/data 
    depends_on:
      prefect-server:
        condition: service_healthy
    command: python main.py
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # --- 3. BRANDWATCH EXTRACTION ---
  brandwatch-extraction:
    build:
      context: ./brandwatch_extraction
      dockerfile: Dockerfile.brandwatch
    container_name: prefect-brandwatch-extraction
    restart: unless-stopped
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - PYTHONPATH=/opt/prefect/prod/code/brandwatch_extraction
    volumes:
      - /opt/prefect/prod/.env:/opt/prefect/prod/.env:ro
    depends_on:
      prefect-server:
        condition: service_healthy
    command: python main.py
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # --- 5. POWER BI DISPATCHER ---
  powerbi-sales-report-dispatcher:
    build: ./powerbi_sales_report_dispatcher
    container_name: powerbi-sales-report-dispatcher
    ports:
      - "8002:8002"
    volumes:
      - /opt/prefect/prod/.env:/app/.env:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # --- 6. DOCID TOOL ---
  docid-tool:
    build: ./docid_tool 
    container_name: docid-tool
    ports:
      - "8003:8002"
    volumes:
      - /opt/prefect/prod/.env:/app/.env:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # --- 7. HOMEPAGE ---
  homepage:
    build: ./homepage
    container_name: homepage
    restart: unless-stopped
    ports:
      - "80:80"
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # --- 8. PORTAINER ---
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9443:9443"
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

volumes:
  portainer_data: