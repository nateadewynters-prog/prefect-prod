services:
  # --- 1. THE ORCHESTRATION BRAIN ---
  prefect-server:
    image: prefecthq/prefect:3-python3.13
    container_name: prefect-server
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      - PREFECT_API_URL=http://10.1.50.127:4200/api
      - PREFECT_UI_API_URL=http://10.1.50.127:4200/api
    volumes:
      - /opt/prefect/prod/prefect_db_data:/root/.prefect
    command: prefect server start --host 0.0.0.0
    # Added Log Rotation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- 2. OUTLOOK WORKER ---
  outlook-automation:
    build:
      context: ./outlook_automation  # <-- 1. Context isolated to outlook folder
      dockerfile: Dockerfile.outlook
    container_name: prefect-outlook-automation
    restart: unless-stopped
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    volumes:
      - /opt/prefect/prod/.env:/opt/prefect/prod/.env:ro
      # 2. Volumes mapped to your original paths!
      - ./outlook_automation/config:/opt/prefect/prod/code/outlook_automation/config
      - /opt/data/outlook_automation/data:/opt/prefect/prod/code/outlook_automation/data
    depends_on:
      - prefect-server
    # 3. Command uses your original path!
    command: python -m outlook_automation.email_extraction_flow
    # Added Log Rotation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- 3. BRANDWATCH WORKHORSE ---
  brandwatch-sync:
    build:
      context: ./brandwatch          # <-- 1. Context isolated to brandwatch folder
      dockerfile: Dockerfile.brandwatch
    container_name: prefect-brandwatch-sync
    restart: unless-stopped
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    volumes:
      - /opt/prefect/prod/.env:/opt/prefect/prod/.env:ro
      - /opt/data/brandwatch_outputs:/opt/data/brandwatch_outputs
    depends_on:
      - prefect-server
    # 3. Command uses your original path!
    command: >
      sh -c "python brandwatch/brandwatch_channel_sync.py &
             python brandwatch/brandwatch_content_sync.py &
             python brandwatch/brandwatch_comments_sync.py &
             wait"
    # Added Log Rotation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
